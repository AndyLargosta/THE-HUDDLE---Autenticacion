<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PassPort Inc.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef0f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.3rem;
      margin-bottom: 0.3rem;
      color: #1b2a4a;
    }

    p.subtitle {
      font-size: 0.8rem;
      color: #8a95a3;
      margin-bottom: 1.5rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #e0e4ea;
      padding-bottom: 0.75rem;
    }

    .tab {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      color: #8a95a3;
      padding: 0;
    }

    .tab.active {
      color: #1b2a4a;
      font-weight: 600;
      border-bottom: 2px solid #1b2a4a;
      padding-bottom: 2px;
    }

    .form { display: none; flex-direction: column; gap: 0.75rem; }
    .form.active { display: flex; }

    input, select {
      padding: 0.6rem 0.75rem;
      border: 1px solid #d1d8e0;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
      width: 100%;
      color: #1b2a4a;
      background: #f8f9fb;
    }

    input:focus, select:focus {
      border-color: #1b2a4a;
      background: white;
    }

    input::placeholder { color: #aab2bc; }

    button[type="submit"] {
      padding: 0.65rem;
      background: #1b2a4a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.2s;
    }

    button[type="submit"]:hover { background: #26396b; }

    .message {
      font-size: 0.85rem;
      padding: 0.6rem 0.75rem;
      border-radius: 6px;
      display: none;
      margin-bottom: 0.75rem;
    }

    .message.success { background: #edf7f0; color: #1a6b3c; display: block; }
    .message.error   { background: #fdf0f0; color: #9b2020; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛂 PassPort Inc.</h1>
    <p class="subtitle">Gestor de identidad digital seguro</p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="tab" onclick="switchTab('register')">Registrarse</button>
    </div>

    <div id="message" class="message"></div>

    <!-- LOGIN -->
    <div id="loginForm" class="form active">
      <input type="email" id="loginEmail" placeholder="Email" />
      <input type="password" id="loginPassword" placeholder="Contraseña" />
      <select id="loginMode">
        <option value="cookie">Sesión con Cookie</option>
        <option value="jwt">Sesión con JWT</option>
      </select>
      <button type="submit" onclick="login()">Entrar</button>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="form">
      <input type="email" id="registerEmail" placeholder="Email" />
      <input type="password" id="registerPassword" placeholder="Contraseña" />
      <button type="submit" onclick="register()">Crear cuenta</button>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
      document.getElementById('loginForm').classList.toggle('active', tab === 'login');
      document.getElementById('registerForm').classList.toggle('active', tab === 'register');
      clearMessage();
    }

    function showMessage(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = `message ${type}`;
    }

    function clearMessage() {
      const el = document.getElementById('message');
      el.className = 'message';
      el.textContent = '';
    }

    async function register() {
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;
      if (!email || !password) return showMessage('Completá todos los campos', 'error');

      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();
      if (res.ok) {
        showMessage('¡Cuenta creada! Ahora iniciá sesión.', 'success');
        switchTab('login');
      } else {
        showMessage(data.error, 'error');
      }
    }

    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const mode = document.getElementById('loginMode').value;
      if (!email || !password) return showMessage('Completá todos los campos', 'error');

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ email, password, mode }),
      });

      const data = await res.json();
      if (res.ok) {
        if (mode === 'jwt') localStorage.setItem('token', data.token);
        localStorage.setItem('csrfToken', data.csrfToken);
        localStorage.setItem('mode', mode);
        window.location.href = '/dashboard.html';
      } else {
        showMessage(data.error, 'error');
      }
    }
  </script>
</body>
</html>
